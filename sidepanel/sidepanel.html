<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Application Helper</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>

  <body>
    <main class="app">
      <header class="hero">
        <div class="eyebrow-row">
          <span class="eyebrow-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M10.5 13.5 13.5 10.5" />
              <path d="M8.25 11.75 6.7 13.3a3.2 3.2 0 0 0 4.52 4.52l2.05-2.05a3.2 3.2 0 0 0 0-4.52" />
              <path d="M15.75 12.25 17.3 10.7a3.2 3.2 0 0 0-4.52-4.52l-2.05 2.05a3.2 3.2 0 0 0 0 4.52" />
            </svg>
          </span>
          <span>Chrome Side Panel</span>
        </div>

        <h1>Application Helper</h1>
      </header>

      <section class="card config-card">
        <button
          id="configToggleButton"
          type="button"
          class="config-toggle is-open"
          aria-expanded="true"
          aria-controls="configPanel"
        >
          <span class="config-toggle-label">
            <span class="config-toggle-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
              </svg>
            </span>
            <span>Configuration</span>
          </span>
          <span class="config-chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </span>
        </button>

        <div id="configPanel" class="config-panel is-open" role="region" aria-label="Configuration">
          <div class="config-panel-inner">
            <p class="config-help">
              Set the Google Sheet and Resume template used by this extension.
            </p>

            <label class="config-label" for="spreadsheetIdInput">Google Sheet URL or ID</label>
            <input
              id="spreadsheetIdInput"
              type="text"
              class="config-input"
              placeholder="https://docs.google.com/spreadsheets/d/..."
              autocomplete="off"
            />

            <label class="config-label" for="sheetNameInput">Sheet tab name</label>
            <input
              id="sheetNameInput"
              type="text"
              class="config-input"
              placeholder="Sheet1"
              autocomplete="off"
            />

            <label class="config-label" for="resumeTemplateInput">Resume Template</label>
            <input
              id="resumeTemplateInput"
              type="text"
              class="config-input"
              placeholder="https://docs.google.com/document/d/..."
              autocomplete="off"
            />

            <button id="saveConfigButton" type="button" class="secondary-button config-save-button">
              <span>Save configuration</span>
            </button>

            <p id="configStatus" class="config-status is-hidden" aria-live="polite"></p>
          </div>
        </div>
      </section>

      <section class="card save-card">
        <div class="card-title-row">
          <span class="sheet-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M7 3h7l4 4v14H7z" />
              <path d="M14 3v5h5" />
              <path d="M9.5 11h7" />
              <path d="M9.5 14h7" />
              <path d="M9.5 17h7" />
              <path d="M12 11v6" />
            </svg>
          </span>

          <h2>Save to Google Sheet</h2>
        </div>

        <button id="saveAllTabsButton" type="button" class="primary-button">
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M8 6h12M8 12h12M8 18h8" />
              <path d="M5 6h.01M5 12h.01M5 18h.01" />
            </svg>
          </span>
          <span>Save all tabs</span>
        </button>

        <button id="removeDuplicatesButton" type="button" class="remove-duplicates-button">
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M8 6h11" />
              <path d="M8 12h8" />
              <path d="M8 18h5" />
              <path d="M5 6h.01M5 12h.01M5 18h.01" />
              <path d="M16 12v4" />
              <path d="M14 14h4" />
            </svg>
          </span>
          <span>Remove Duplicate</span>
        </button>

        <button id="checkCompanyDuplicatesButton" type="button" class="warning-button">
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
              <path d="M12 9v4" />
              <path d="M12 17h.01" />
            </svg>
          </span>
          <span>Check Company Duplicates</span>
        </button>

        <div class="note-input-wrap">
          <input
            id="noteInput"
            type="text"
            class="note-input"
            placeholder="Add a note for the commnet on the application"
          />
          <button
            id="clearNoteButton"
            type="button"
            class="note-clear-button is-hidden"
            aria-label="Clear note"
          >
            ×
          </button>
        </div>

        <button id="createGoogleDocButton" type="button" class="primary-button">
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M7 3h7l4 4v14H7z" />
              <path d="M14 3v5h5" />
              <path d="M12 11v6" />
              <path d="M9.5 14h5" />
            </svg>
          </span>
          <span>Apply Now</span>
        </button>

        <button id="saveButton" type="button" class="primary-button">
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 16V8" />
              <path d="m8.5 11.5 3.5-3.5 3.5 3.5" />
              <path d="M7 18.5a4.5 4.5 0 0 1-.8-8.92A6 6 0 0 1 17.65 8.4 4.9 4.9 0 0 1 18 18.5z" />
            </svg>
          </span>
          <span>Save current tab</span>
        </button>
      </section>

      <section id="statusCard" class="status-card is-hidden" aria-live="polite">
        <span class="status-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="m5 12.5 4.25 4.25L19 7" />
          </svg>
        </span>

        <div>
          <strong id="statusTitle">Saved:</strong>
          <p id="status"></p>
        </div>
      </section>

      <section id="deletedRowsCard" class="card deleted-rows-card is-hidden">
        <div class="logs-header">
          <h2>Deleted Rows</h2>
        </div>

        <div class="deleted-rows-shell">
          <div id="emptyDeletedRows" class="empty-logs">
            <span class="empty-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M8 7h8" />
                <path d="M8 12h8" />
                <path d="M8 17h5" />
                <path d="M5 7h.01" />
                <path d="M5 12h.01" />
                <path d="M5 17h.01" />
              </svg>
            </span>
            <strong>No deleted rows yet.</strong>
            <p>Removed duplicates will appear here.</p>
          </div>

          <ul id="deletedRowsList" class="deleted-rows-list"></ul>
        </div>
      </section>

      <section class="card logs-card">
        <div class="logs-header">
          <h2>Process Logs</h2>

          <button id="clearLogsButton" class="secondary-button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />
              <path d="M6 7l1 14h10l1-14" />
              <path d="M9 7V4h6v3" />
            </svg>
            <span>Clear</span>
          </button>
        </div>

        <div class="logs-shell">
          <div id="emptyLogs" class="empty-logs">
            <span class="empty-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M8 7h8" />
                <path d="M8 12h8" />
                <path d="M8 17h5" />
                <path d="M5 7h.01" />
                <path d="M5 12h.01" />
                <path d="M5 17h.01" />
              </svg>
            </span>
            <strong>No logs yet.</strong>
            <p>Activity will appear here.</p>
          </div>

          <ul id="logsList" class="logs-list" aria-live="polite"></ul>
        </div>
      </section>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
